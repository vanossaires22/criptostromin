version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure_password_change_me
      POSTGRES_DB: exchange_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - exchange-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - exchange-net

volumes:
  pgdata:

networks:
  exchange-net:
    driver: bridge